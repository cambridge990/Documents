<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cambridge Court">
<meta name="theme-color" content="#1a2744">
<title>Cambridge Court – Community Documents</title>
<style>
  :root {
    --navy: #1a2744;
    --navy-light: #243360;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f7f4ee;
    --cream-dark: #ede8de;
    --text: #1a1a2e;
    --text-muted: #6b6b80;
    --white: #ffffff;
    --card-bg: #ffffff;
    --divider: #e8e4da;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(26,39,68,0.10);
    --shadow-lg: 0 8px 32px rgba(26,39,68,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ── Header ── */
  .app-header {
    background: var(--navy);
    padding: 52px 20px 20px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
  }
  .app-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 15% 50%, rgba(201,168,76,0.07) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-inner { position: relative; z-index: 1; }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .logo-area h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 0.01em;
    line-height: 1.1;
  }
  .logo-area p {
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .doc-count {
    background: rgba(201,168,76,0.2);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .home-link {
    display: block;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    letter-spacing: 0.04em;
    margin-top: 8px;
    transition: color 0.2s;
  }
  .home-link:hover { color: var(--gold-light); }

  /* ── Content ── */
  .content {
    padding: 16px 16px 80px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── Loading / Error states ── */
  .status-msg {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .status-msg .icon { font-size: 32px; margin-bottom: 12px; }
  .status-msg.error { color: #c0392b; }

  /* ── Category section ── */
  .category-section {
    margin-bottom: 24px;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 4px;
    border-bottom: 2px solid var(--gold);
    margin-bottom: 10px;
  }
  .category-icon {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .category-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--navy);
  }
  .category-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ── Document card ── */
  .doc-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .doc-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
  .doc-card:active { transform: scale(0.985); }
  .doc-row {
    display: flex;
    align-items: center;
    padding: 13px 14px;
    gap: 12px;
    text-decoration: none;
    color: inherit;
  }
  .doc-type-badge {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    background: #fde8e8;
    color: #c0392b;
  }
  .doc-info { flex: 1; min-width: 0; }
  .doc-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .doc-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .doc-arrow { font-size: 14px; color: var(--text-muted); flex-shrink: 0; }

  /* ── Empty category ── */
  .empty-category {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    border: 1.5px dashed var(--divider);
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-area">
        <h1>Cambridge Court</h1>
        <p>Community Documents</p>
      </div>
      <div class="doc-count" id="docCount">Loading…</div>
    </div>
    <a class="home-link" href="https://cambridgecourt.info">← Back to Portal</a>
  </div>
</header>

<main class="content" id="content">
  <div class="status-msg" id="statusMsg">
    <div class="icon">⏳</div>
    Loading documents…
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIGURATION
//  To update the Google Sheet URL, replace the value below.
// ═══════════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbp03lV2FJE5hvCU4i65WIVhcqAzxHGwBRLEUJ8Jv27SEXwr-tb-6CqpzQScE4tVMx/exec";

// Category definitions — order, labels, and icons
const CATEGORIES = [
  { id: "bylaws",     title: "By-Laws",         icon: "⚖️" },
  { id: "houserules", title: "House Rules",      icon: "🏠" },
  { id: "minutes",    title: "Meeting Minutes",  icon: "📋" },
  { id: "notices",    title: "Notices",          icon: "📌" },
];

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
function render(docs) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  // Group by category
  const grouped = {};
  CATEGORIES.forEach(cat => { grouped[cat.id] = []; });
  docs.forEach(doc => {
    const key = doc.category.toLowerCase().replace(/\s/g, '');
    if (grouped[key] !== undefined) grouped[key].push(doc);
  });

  let total = 0;
  CATEGORIES.forEach((cat, i) => {
    const items = grouped[cat.id] || [];
    total += items.length;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.style.animationDelay = (i * 0.07 + 0.05) + 's';

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <div class="category-icon">${cat.icon}</div>
      <div class="category-title">${cat.title}</div>
      <div class="category-count">${items.length} document${items.length !== 1 ? 's' : ''}</div>
    `;
    section.appendChild(header);

    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-category';
      empty.textContent = 'No documents posted yet.';
      section.appendChild(empty);
    } else {
      items.forEach(doc => {
        const card = document.createElement('div');
        card.className = 'doc-card';
        const link = document.createElement('a');
        link.className = 'doc-row';
        link.href = doc.file;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.innerHTML = `
          <div class="doc-type-badge">PDF</div>
          <div class="doc-info">
            <div class="doc-title">${doc.title}</div>
            <div class="doc-meta">${doc.date || ''}</div>
          </div>
          <div class="doc-arrow">›</div>
        `;
        card.appendChild(link);
        section.appendChild(card);
      });
    }
    content.appendChild(section);
  });

  document.getElementById('docCount').textContent =
    `${total} document${total !== 1 ? 's' : ''}`;
}

// ═══════════════════════════════════════════════════════════════════
//  FETCH DATA
// ═══════════════════════════════════════════════════════════════════
async function loadData() {
  const statusMsg = document.getElementById('statusMsg');
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error('Network error');
    const rows = await res.json();
    const docs = rows
      .filter(r => r.category && r.title && r.file)
      .map(r => ({
        category: String(r.category || '').trim().toLowerCase(),
        title:    String(r.title    || '').trim(),
        date:     String(r.date     || '').trim(),
        file:     String(r.file     || '').trim(),
      }));
    render(docs);
  } catch (err) {
    statusMsg.className = 'status-msg error';
    statusMsg.innerHTML = '<div class="icon">⚠️</div>Unable to load documents.<br>Please try again later.';
    document.getElementById('docCount').textContent = 'Unavailable';
  }
}

loadData();
</script>
</body>
</html>
